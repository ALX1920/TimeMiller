<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Miller</title>

    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <header>
    <h1>TimeMiller</h1>

    <!-- Visit counter will be activated later -->
    <!--<div id="visits">Visits: ...</div>-->
  </header>

  <main>
    <section>
      <h2>Time elapsed on Earth</h2>
      <p id="earth-time"></p>
    </section>

    <section>
      <h2>Equivalent time on Miller</h2>
      <p id="miller-time"></p>
    </section>

    <div id="info text">
      Time has been running since November 7, 2014 at 00:00, based on the rule that 1 hour on Miller equals 7 years on Earth.
    </div>
  </main>

  <footer style="text-align:center; margin-top:40px; padding:20px; opacity:0.85; font-size:14px;">

  <p style="margin-bottom:10px;">
     If you like this project, support it on GitHub:
  </p>

  <a href="https://github.com/ALX1920/TimeMiller" target="_blank">
    <img src="https://img.shields.io/github/stars/ALX1920/TimeMiller?style=social" 
         alt="GitHub stars">
  </a>

</footer>

  <!-- Clock logic -->
  <script src="js/script.js"></script>
</body>
</html>
