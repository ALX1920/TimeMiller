<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Miller</title>

    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <header>
    <h1>TimeMiller</h1>

    <!-- Visit counter will be activated later -->
    <div id="visits">Visits: ...</div>
  </header>

  <main>
    <section>
      <h2>Time elapsed on Earth</h2>
      <p id="earth-time"></p>
    </section>

    <section>
      <h2>Equivalent time on Miller</h2>
      <p id="miller-time"></p>
    </section>

    <div id="info text">
      Time has been running since November 7, 2014 at 00:00, based on the rule that 1 hour on Miller equals 7 years on Earth.
    </div>
  </main>

  <!-- Clock logic -->
  <script src="js/script.js"></script>
</body>
</html>
